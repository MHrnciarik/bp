default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: bp_development

test:
  <<: *default
  database: bp_test

production:
  primary:
    <<: *default
    database: bp_production
  cache:
    <<: *default
    database: bp_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: bp_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: bp_production_cable
    migrations_paths: db/cable_migrate